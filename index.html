<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Masterproef - Interactief Recept</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            text-align: center; 
            background-color: #f0fdf4; 
            color: #166534; 
            margin: 0; 
            padding-top: 50px; 
        }
        .hidden { display: none; }
        #instruction { font-size: 2.2rem; min-height: 150px; padding: 0 20px; display: flex; align-items: center; justify-content: center; }
        #status-icon { font-size: 150px; margin-top: 20px; }
        #recipe { 
            background: white; border: 5px solid #166534; padding: 30px; 
            border-radius: 20px; display: inline-block; margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        ul { text-align: left; font-size: 1.8rem; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1 id="instruction">Klik op het scherm om te starten...</h1>
        <div id="status-icon">🍄</div>
    </div>

    <div id="recipe" class="hidden">
        <h2>👨‍🍳 Recept: Oesterzwammen</h2>
        <ul>
            <li>Scheur de oesterzwammen in reepjes.</li>
            <li>Verhit de olijfolie in de pan.</li>
            <li>Bak ze goudbruin in 5 minuten.</li>
            <li>Voeg een snufje zout toe en smakelijk!</li>
        </ul>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // --- CONFIGURATIE ---
        const tagOesterzwam = "214503785897";
        const tagOlijfolie = "85065013890"; 

        const player = document.getElementById('audio-player');
        let step = 0;

        // Functie om meerdere MP3's achter elkaar af te spelen
        async function speelLijst(bestanden, tekst) {
            document.getElementById('instruction').innerText = tekst;
            for (const bestand of bestanden) {
                await new Promise((resolve) => {
                    player.src = encodeURIComponent(bestand);
                    player.play();
                    player.onended = resolve; // Wacht tot fragment klaar is
                });
            }
        }

        // --- START BIJ KLIK ---
        window.onclick = () => {
            if (step === 0) {
                step = 1;
                speelLijst(
                    ["Leuk We gaan dit rec.mp3", "Zoek de.mp3", "Oesterzwammen.mp3"],
                    "Leuk, we gaan dit recept maken! Zoek de oesterzwammen."
                );
            }
        };

        // --- RFID SCANNER LOOP ---
        setInterval(async () => {
            if (step === 0 || step === 3) return;
            try {
                const resp = await fetch('last_tag.txt?t=' + Date.now());
                const id = (await resp.text()).trim();
                if (id !== "") handleScan(id);
            } catch (e) { }
        }, 1000);

        // --- LOGICA NA SCAN ---
        function handleScan(id) {
            if (step === 1 && id === tagOesterzwam) {
                step = 2;
                document.getElementById('status-icon').innerText = "🫒";
                speelLijst(
                    ["Goed zo Zoek nu het .mp3", "Zoek de.mp3", "Olijfolie.mp3"],
                    "Goed zo! Zoek nu het volgende ingrediënt: de olijfolie."
                );
            } 
            else if (step === 2 && id === tagOlijfolie) {
                step = 3;
                speelLijst(
                    ["Goed gedaan We hebbe.mp3"],
                    "Goed gedaan! We hebben nu alles om dit te maken."
                );
                
                // Toon het recept na een kleine vertraging
                setTimeout(() => {
                    document.getElementById('game-container').classList.add('hidden');
                    document.getElementById('recipe').classList.remove('hidden');
                }, 3000);
            }
        }
    </script>
</body>
</html>
