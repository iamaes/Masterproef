<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabouterhapjes - Masterproef</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0fdf4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        #status-text {
            font-size: 3rem;
            color: #166534;
            margin-bottom: 20px;
            padding: 0 20px;
        }
        #recipe-container {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 80%;
        }
        .icon { font-size: 100px; margin: 20px; }
    </style>
</head>
<body>

    <div id="status-text">Klik ergens om te starten...</div>
    <div id="icon-display" class="icon">🍄</div>

    <div id="recipe-container">
        <h1>Recept: Gebakken Oesterzwammen</h1>
        <ul style="text-align: left; font-size: 1.5rem;">
            <li>Scheur de oesterzwammen in reepjes.</li>
            <li>Verhit de olijfolie in de pan.</li>
            <li>Bak ze goudbruin in 5 minuten.</li>
            <li>Voeg een snufje zout toe en smullen maar!</li>
        </ul>
    </div>

    <script>
        // --- CONFIGURATIE ---
        // VUL HIER JE EIGEN RFID NUMMERS IN
        const tagOesterzwam = "214503785897"; 
        const tagOlijfolie = "85065013890"; 

        let step = 0; // 0: Start, 1: Zoek Oesterzwam, 2: Zoek Olijfolie, 3: Recept

        // --- SPRAAK FUNCTIE ---
        function spreek(tekst) {
            const m = new SpeechSynthesisUtterance(tekst);
            m.lang = 'nl-NL';
            m.rate = 0.9; // Iets langzamer voor een kabouter-effect
            window.speechSynthesis.speak(m);
            document.getElementById('status-text').innerText = tekst;
        }

        // --- START NA KLIK ---
        window.onclick = () => {
            if (step === 0) {
                step = 1;
                spreek("Leuk, we gaan oesterzwammen klaarmaken! Zoek de oesterzwammen.");
                document.getElementById('icon-display').innerText = "❓";
            }
        };

        // --- RFID LOOP ---
        setInterval(async () => {
            if (step === 0 || step === 3) return;

            try {
                const response = await fetch('last_tag.txt?t=' + Date.now());
                const tagID = (await response.text()).trim();

                if (tagID !== "") {
                    handleScan(tagID);
                }
            } catch (e) { console.log("Bestand nog niet leesbaar"); }
        }, 1000);

        function handleScan(id) {
            if (step === 1 && id === tagOesterzwam) {
                step = 2;
                document.getElementById('icon-display').innerText = "✅";
                spreek("Goed zo! Zoek nu de olijfolie.");
                setTimeout(() => { document.getElementById('icon-display').innerText = "🫒"; }, 2000);
            } 
            else if (step === 2 && id === tagOlijfolie) {
                step = 3;
                document.getElementById('icon-display').innerText = "👨‍🍳";
                spreek("Goed gedaan! We hebben alles om de oesterzwammen klaar te maken. Dit is het recept.");
                
                // Toon recept
                document.getElementById('status-text').style.display = 'none';
                document.getElementById('icon-display').style.display = 'none';
                document.getElementById('recipe-container').style.display = 'block';
            }
        }
    </script>
</body>
</html>
