<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Knapperige kabouterhapjes - RFID Editie</title>
    <style>
        /* Jouw bestaande stijlen blijven hetzelfde */
        html, body { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: 'Arial', sans-serif; display: flex; background-color: #f0f0f0; }
        .container { display: flex; width: 100%; height: 100%; }
        .sidebar { width: 20%; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 10px 0; background-color: #E5DCAF; overflow-y: auto; }
        .ingredient-img { width: 80px; height: 80px; object-fit: contain; transition: border 0.3s; border: 5px solid transparent; border-radius: 10px; }
        .ingredient-img.found { border: 5px solid green; }
        .main-content { width: 80%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; text-align: center; padding: 20px; box-sizing: border-box; position: relative; }
        .header h1 { font-size: 3em; color: #333; margin: 0; }
        #start-screen { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #start-button { padding: 50px 100px; font-size: 3em; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 15px; box-shadow: 0 10px 0 #38763a; }
        .search-screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; width: 100%; }
        .large-ingredient { width: 200px; height: 200px; object-fit: contain; margin-bottom: 30px; }
        #rfid-status { font-size: 1.5em; color: #555; font-style: italic; margin-top: 20px; }
        #recipe-screen { display: none; flex-direction: column; align-items: center; flex-grow: 1; width: 100%; text-align: left; }
        #recipe-content-wrapper { display: flex; width: 100%; height: 70vh; margin-top: 20px; border: 2px solid #555; border-radius: 15px; background-color: white; overflow: hidden; }
        .recipe-left, .recipe-right { padding: 15px; width: 50%; overflow-y: auto; }
        .recipe-right video { width: 100%; border-radius: 8px; }
        #reset-button { margin-top: 10px; padding: 10px 20px; font-size: 1.2em; cursor: pointer; background-color: #333; color: white; border-radius: 8px; width: 100%; }
        #confetti-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00, #ff0000); opacity: 0; display: none; pointer-events: none; z-index: 20; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <img id="img-oesterzwam" class="ingredient-img" src="oesterzwam.png">
            <img id="img-olijfolie" class="ingredient-img" src="olijfolie.png">
        </div>
        <div class="main-content">
            <div class="header"><h1>Knapperige kabouterhapjes</h1></div>
            <div id="start-screen"><button id="start-button">START!</button></div>
            <div id="search-screen" class="search-screen">
                <h2 id="search-text">Zoek ingrediënt...</h2>
                <img id="large-ingredient-img" class="large-ingredient" src="">
                <div id="rfid-status">Houd de tag tegen de magische lezer...</div>
            </div>
            <div id="recipe-screen">
                <h2>Het Recept</h2>
                <div id="recipe-content-wrapper">
                    <div class="recipe-left">
                        <h3>Ingrediënten:</h3>
                        <ul><li>250g oesterzwammen</li><li>Olijfolie</li></ul>
                        <h3>Bereiding:</h3>
                        <ol><li>Bak de zwammen goudbruin in de olie.</li></ol>
                    </div>
                    <div class="recipe-right">
                        <video id="recipe-video" src="Zwamzakken_lied.mp4" controls loop></video>
                        <button id="reset-button">Opnieuw</button>
                    </div>
                </div>
            </div>
            <div id="confetti-overlay"></div>
        </div>
    </div>

    <script>
        const ingredients = [
            { name: "oesterzwammen", id: "oesterzwam", file: "oesterzwam.png", rfid: "214503785897" },
            { name: "olijfolie", id: "olijfolie", file: "olijfolie.png", rfid: "85065013890" }
        ];

        let currentIndex = 0;
        const searchScreen = document.getElementById('search-screen');
        const recipeScreen = document.getElementById('recipe-screen');
        const recipeVideo = document.getElementById('recipe-video');

        // Luister naar de Python "Bridge"
        window.addEventListener('message', (event) => {
            const scannedID = event.data.toString().trim();
            checkRFID(scannedID);
        });

        function checkRFID(tagID) {
            const target = ingredients[currentIndex];
            if (tagID === target.rfid) {
                ingredientFound();
            }
        }

        function ingredientFound() {
            document.getElementById(`img-${ingredients[currentIndex].id}`).classList.add('found');
            const overlay = document.getElementById('confetti-overlay');
            overlay.style.display = 'block'; overlay.style.opacity = '0.8';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                currentIndex++;
                if (currentIndex < ingredients.length) {
                    updateSearch();
                } else {
                    showRecipe();
                }
            }, 2000);
        }

        function updateSearch() {
            const item = ingredients[currentIndex];
            document.getElementById('search-text').textContent = `Zoek: ${item.name.toUpperCase()}`;
            document.getElementById('large-ingredient-img').src = item.file;
            speak(`Zoek de ${item.name}`);
        }

        function showRecipe() {
            searchScreen.style.display = 'none';
            recipeScreen.style.display = 'flex';
            recipeVideo.play();
            speak("Gefeliciteerd! Je hebt alles gevonden.");
        }

        function speak(t) { 
            const u = new SpeechSynthesisUtterance(t); u.lang = 'nl-NL'; window.speechSynthesis.speak(u); 
        }

        document.getElementById('start-button').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            searchScreen.style.display = 'flex';
            updateSearch();
        });

        document.getElementById('reset-button').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
