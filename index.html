<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Knapperige kabouterhapjes - RFID</title>
    <style>
        html, body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            overflow: hidden; font-family: 'Arial', sans-serif; 
            display: flex; background-color: #f0f0f0; 
        }
        .container { display: flex; width: 100%; height: 100%; }
        
        /* Zijbalk met 2 ingrediënten */
        .sidebar { 
            width: 20%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            gap: 50px; background-color: #E5DCAF; 
        }
        .ingredient-img { 
            width: 120px; height: 120px; object-fit: contain; 
            transition: all 0.3s; border: 5px solid transparent; 
            border-radius: 15px; opacity: 0.3;
        }
        .ingredient-img.found { border: 5px solid green; opacity: 1; transform: scale(1.1); }

        /* Hoofdinhoud */
        .main-content { 
            width: 80%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            text-align: center; padding: 20px; box-sizing: border-box; 
        }
        .header h1 { font-size: 3em; color: #333; margin-bottom: 20px; }
        
        .search-screen { display: flex; flex-direction: column; align-items: center; }
        .large-ingredient { width: 300px; height: 300px; object-fit: contain; margin-bottom: 30px; }
        #rfid-status { font-size: 1.5em; color: #555; font-style: italic; }

        /* Receptscherm */
        #recipe-screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        #recipe-content-wrapper { 
            display: flex; width: 95%; height: 70vh; 
            border: 2px solid #555; border-radius: 15px; background-color: white; 
            overflow: hidden; 
        }
        .recipe-left, .recipe-right { padding: 25px; width: 50%; overflow-y: auto; text-align: left; }
        .recipe-right video { width: 100%; border-radius: 10px; }
        #reset-button { 
            margin-top: 20px; padding: 15px; font-size: 1.2em; 
            cursor: pointer; background-color: #333; color: white; border-radius: 8px; width: 100%; 
        }

        #feedback-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(76, 175, 80, 0.9); display: none; 
            align-items: center; justify-content: center; font-size: 10em; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <img id="img-oesterzwam" class="ingredient-img" src="oesterzwam.png">
            <img id="img-olijfolie" class="ingredient-img" src="olijfolie.png">
        </div>

        <div class="main-content">
            <div id="search-screen" class="search-screen">
                <div class="header"><h1>Knapperige kabouterhapjes</h1></div>
                <h2 id="search-text">Zoek de oesterzwammen</h2>
                <img id="large-ingredient-img" class="large-ingredient" src="oesterzwam.png">
                <div id="rfid-status">🔮 Houd de tag tegen de magische lezer...</div>
            </div>

            <div id="recipe-screen">
                <h2>Smakelijk!</h2>
                <div id="recipe-content-wrapper">
                    <div class="recipe-left">
                        <h3>Ingrediënten:</h3>
                        <ul><li>250g oesterzwammen</li><li>Olijfolie</li><li>Kruiden</li></ul>
                        <h3>Bereiding:</h3>
                        <ol><li>Bak de zwammen goudbruin.</li></ol>
                    </div>
                    <div class="recipe-right">
                        <video id="recipe-video" src="Zwamzakken_lied.mp4" controls loop></video>
                        <button id="reset-button">Opnieuw beginnen</button>
                    </div>
                </div>
            </div>
            <div id="feedback-overlay">✅</div>
        </div>
    </div>

    <script>
        const ingredients = [
            { name: "oesterzwammen", id: "oesterzwam", file: "oesterzwam.png", rfid: "214503785897" },
            { name: "olijfolie", id: "olijfolie", file: "olijfolie.png", rfid: "85065013890" }
        ];

        let currentIndex = 0;
        let lastTag = "";

        // Start direct met praten
        window.onload = () => { speak("Welkom! Zoek de oesterzwammen."); };

        // RFID Check Loop (elke seconde)
        setInterval(async () => {
            try {
                const resp = await fetch('last_tag.txt?t=' + Date.now());
                if (resp.ok) {
                    const tagID = (await resp.text()).trim();
                    if (tagID !== "" && tagID !== lastTag) {
                        lastTag = tagID;
                        checkRFID(tagID);
                    }
                }
            } catch (e) { /* Bestand nog niet klaar */ }
        }, 1000);

        function checkRFID(tagID) {
            if (tagID === ingredients[currentIndex].rfid) {
                success();
            } else {
                console.log("Verkeerde tag!");
            }
        }

        function success() {
            document.getElementById(`img-${ingredients[currentIndex].id}`).classList.add('found');
            document.getElementById('feedback-overlay').style.display = 'flex';
            speak("Goed gedaan!");

            setTimeout(() => {
                document.getElementById('feedback-overlay').style.display = 'none';
                currentIndex++;
                if (currentIndex < ingredients.length) {
                    updateUI();
                } else {
                    showRecipe();
                }
            }, 2000);
        }

        function updateUI() {
            const item = ingredients[currentIndex];
            document.getElementById('search-text').textContent = `Zoek de ${item.name}`;
            document.getElementById('large-ingredient-img').src = item.file;
            speak(`Zoek nu de ${item.name}`);
        }

        function showRecipe() {
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('recipe-screen').style.display = 'flex';
            document.getElementById('recipe-video').play();
            speak("Je hebt alles gevonden! Hier is het recept.");
        }

        function speak(t) {
            const m = new SpeechSynthesisUtterance(t); m.lang = 'nl-NL'; window.speechSynthesis.speak(m);
        }

        document.getElementById('reset-button').addEventListener('click', () => { location.reload(); });
    </script>
</body>
</html>
