<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate" />
    <title>Masterproef - Interactief Recept</title>
    <style>
        /* Voorkom scrollen volledig */
        html, body { 
            height: 100%; 
            margin: 0; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: 'Comic Sans MS', cursive, sans-serif;
            color: #166534;
        }
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; /* Ruimte tussen de rand van het scherm en de inhoud */
            box-sizing: border-box;
        }

        .hidden { display: none !important; }

        /* Instructie tekst met ruimte */
        #instruction { 
            font-size: 2.2rem; 
            text-align: center; 
            margin-bottom: 30px;
            max-width: 900px; 
            line-height: 1.3;
        }

        /* Afbeelding mooi in het midden en niet te groot */
        #image-container { 
            flex-grow: 1;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%;
            overflow: hidden; /* Zorgt dat er nooit een scrollbar komt door de foto */
            padding: 20px;
            box-sizing: border-box;
        }
        
        #status-img { 
            /* DIT IS DE FIX: */
            max-height: 50vh;    /* De foto mag nooit hoger zijn dan de helft van het scherm */
            max-width: 90vw;     /* De foto mag nooit breder zijn dan bijna het hele scherm */
            width: auto;         /* Houdt de verhouding goed */
            height: auto;        /* Houdt de verhouding goed */
            
            display: block;
            border-radius: 25px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 8px solid white;
            box-sizing: border-box;
        }

        /* Het receptvenster */
        #recipe { 
            background: white; 
            border: 8px solid #166534; 
            padding: 50px; 
            border-radius: 40px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            max-width: 85%;
            animation: fadeIn 0.5s ease-in;
        }

        h2 { font-size: 3.5rem; margin-top: 0; color: #14532d; }
        ul { text-align: left; font-size: 2.2rem; line-height: 1.6; margin-bottom: 0; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #debug { position: fixed; bottom: 10px; right: 10px; font-size: 12px; color: #bbf7d0; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1 id="instruction">Druk op de knop om te starten!</h1>
        <div id="image-container">
            <img id="status-img" src="oesterzwam.png" alt="Wachten op start...">
        </div>
    </div>

    <div id="recipe" class="hidden">
        <h2>👨‍🍳 Het Recept</h2>
        <ul>
            <li>Scheur de oesterzwammen in reepjes.</li>
            <li>Verhit de olijfolie in de pan.</li>
            <li>Bak ze goudbruin in 5 minuten.</li>
            <li>Smakelijk!</li>
        </ul>
    </div>

    <audio id="audio-player"></audio>
    <div id="debug">Systeem klaar...</div>

    <script>
        // --- CONFIGURATIE ---
        const tagOesterzwam = "214503785897";
        const tagOlijfolie = "85065013890"; 

        const player = document.getElementById('audio-player');
        const statusImg = document.getElementById('status-img');
        const instructionText = document.getElementById('instruction');
        
        let step = 0;
        let lastScannedTag = "";
        let isProcessing = false;

        // Functie voor playlist met audiofragmenten
        async function speelLijst(bestanden, tekst, nieuweImg) {
            isProcessing = true; 
            instructionText.innerText = tekst;
            if(nieuweImg) statusImg.src = nieuweImg;

            for (const bestand of bestanden) {
                await new Promise((resolve) => {
                    player.src = encodeURIComponent(bestand);
                    player.play().catch(e => console.log("Audio play error:", e));
                    player.onended = resolve;
                });
            }
            isProcessing = false;
        }

        // De start-logica (nu in een aparte functie)
        function activeerSpel() {
            if (step === 0) {
                step = 1;
                document.getElementById('debug').innerText = "Spel geactiveerd via knop/klik";
                speelLijst(
                    ["Leuk We gaan dit rec.mp3", "Zoek de.mp3", "Oesterzwammen.mp3"],
                    "Leuk, we gaan dit recept maken! Houd het juiste kaartje bovenop de doos. Zoek de oesterzwammen.",
                    "oesterzwam.png"
                );
            }
        }

        // Klikken op het scherm werkt nog steeds als backup
        window.onclick = activeerSpel;

        // --- DE BELANGRIJKSTE LOOP ---
        setInterval(async () => {
            if (isProcessing) return; // Doe niets als de kabouter nog praat

            try {
                const resp = await fetch('last_tag.txt?t=' + Date.now());
                const id = (await resp.text()).trim();

                if (id === "") {
                    lastScannedTag = ""; // Reset als bestand leeg is
                    return;
                }

                // 1. Check voor de Fysieke Knop
                if (id === "START_BUTTON") {
                    activeerSpel();
                    return;
                }

                // 2. Check voor RFID tags (alleen als spel gestart is)
                if (step > 0 && step < 3 && id !== lastScannedTag) {
                    handleScan(id);
                    lastScannedTag = id; 
                }
            } catch (e) { }
        }, 800);

        function handleScan(id) {
            if (step === 1 && id === tagOesterzwam) {
                step = 2;
                speelLijst(
                    ["Goed zo Zoek nu het .mp3", "Zoek de.mp3", "Olijfolie.mp3"],
                    "Goed zo! Zoek nu het volgende ingrediënt. Zoek de olijfolie.",
                    "olijfolie.png"
                );
            } 
            else if (step === 2 && id === tagOlijfolie) {
                step = 3;
                speelLijst(
                    ["Goed gedaan We hebbe.mp3"],
                    "Goed gedaan! We hebben alles om het recept klaar te maken. Hier is het recept."
                );
                
                setTimeout(() => {
                    document.getElementById('game-container').classList.add('hidden');
                    document.getElementById('recipe').classList.remove('hidden');
                }, 3000);
            }
        }
    </script>
</body>
</html>
