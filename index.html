<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Masterproef - Interactief Recept</title>
    <style>
        /* Voorkom scrollen volledig */
        html, body { 
            height: 100%; 
            margin: 0; 
            overflow: hidden; 
            background-color: #f0fdf4; 
            font-family: 'Comic Sans MS', cursive, sans-serif;
            color: #166534;
        }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .hidden { display: none !important; }

        #instruction { font-size: 2.5rem; text-align: center; padding: 20px; max-width: 800px; }

        /* Container voor de afbeeldingen */
        #image-container { height: 300px; display: flex; align-items: center; justify-content: center; }
        #status-img { max-height: 100%; width: auto; border-radius: 20px; }

        #recipe { 
            background: white; border: 8px solid #166534; padding: 40px; 
            border-radius: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            max-width: 80%;
        }
        h2 { font-size: 3rem; margin-top: 0; }
        ul { text-align: left; font-size: 2rem; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1 id="instruction">Tik op het scherm om te starten...</h1>
        <div id="image-container">
            <img id="status-img" src="oesterzwam.png" alt="Ingrediënt">
        </div>
    </div>

    <div id="recipe" class="hidden">
        <h2>👨‍🍳 Het Recept</h2>
        <ul>
            <li>Scheur de oesterzwammen in reepjes.</li>
            <li>Verhit de olijfolie in de pan.</li>
            <li>Bak ze goudbruin in 5 minuten.</li>
            <li>Smakelijk!</li>
        </ul>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const tagOesterzwam = "214503785897";
        const tagOlijfolie = "85065013890"; 

        const player = document.getElementById('audio-player');
        const statusImg = document.getElementById('status-img');
        let step = 0;
        let lastScannedTag = "";
        let isProcessing = false;

        async function speelLijst(bestanden, tekst, nieuweImg) {
            isProcessing = true; // Stop even met RFID checken tijdens het praten
            document.getElementById('instruction').innerText = tekst;
            if(nieuweImg) statusImg.src = nieuweImg;

            for (const bestand of bestanden) {
                await new Promise((resolve) => {
                    player.src = encodeURIComponent(bestand);
                    player.play();
                    player.onended = resolve;
                });
            }
            isProcessing = false;
        }

        window.onclick = () => {
            if (step === 0) {
                step = 1;
                speelLijst(
                    ["Leuk We gaan dit rec.mp3", "Zoek de.mp3", "Oesterzwammen.mp3"],
                    "Leuk, we gaan dit recept maken! Zoek de oesterzwammen.",
                    "oesterzwam.png" // Zorg dat dit bestand in je map staat
                );
            }
        };

        setInterval(async () => {
            if (step === 0 || step === 3 || isProcessing) return;

            try {
                const resp = await fetch('last_tag.txt?t=' + Date.now());
                const id = (await resp.text()).trim();

                // Alleen actie als de tag NIEUW is of anders dan de vorige
                if (id !== "" && id !== lastScannedTag) {
                    handleScan(id);
                    lastScannedTag = id; 
                }
            } catch (e) { }
        }, 800);

        function handleScan(id) {
            if (step === 1 && id === tagOesterzwam) {
                step = 2;
                speelLijst(
                    ["Goed zo Zoek nu het .mp3", "Zoek de.mp3", "Olijfolie.mp3"],
                    "Goed zo! Zoek nu de olijfolie.",
                    "olijfolie.png" // Zorg dat dit bestand in je map staat
                );
            } 
            else if (step === 2 && id === tagOlijfolie) {
                step = 3;
                speelLijst(
                    ["Goed gedaan We hebbe.mp3"],
                    "Goed gedaan! We hebben nu alles."
                );
                
                // Pas na 3 seconden switcht het scherm naar het recept
                setTimeout(() => {
                    document.getElementById('game-container').classList.add('hidden');
                    document.getElementById('recipe').classList.remove('hidden');
                }, 3000);
            }
        }
    </script>
</body>
</html>
